<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Coffee — Javaholics, Fairview</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="styles.css?v=5" />
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="illustrations.jsx?v=2"></script>
<script type="text/babel" src="bean-field.jsx?v=2"></script>
<script type="text/babel" src="sections.jsx?v=2"></script>
<script type="text/babel" src="subpages.jsx?v=2"></script>

<script type="text/babel">
  const CoffeePage = () => {
    React.useEffect(() => {
      const els = document.querySelectorAll('.jv-reveal');
      const vh = window.innerHeight;
      els.forEach(el => {
        const r = el.getBoundingClientRect();
        if (r.top < vh * 0.9) { el.classList.add('in'); }
        else { el.classList.add('jv-reveal-armed'); }
      });
      const io = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            e.target.classList.remove('jv-reveal-armed');
            e.target.classList.add('in');
            io.unobserve(e.target);
          }
        });
      }, { threshold: 0.05, rootMargin: '0px 0px -80px 0px' });
      els.forEach(el => { if (!el.classList.contains('in')) io.observe(el); });
      return () => io.disconnect();
    }, []);

    return (
    <div style={{ background: 'var(--bg)' }}>
      <SecondaryHero
        eyebrow="02 / The Coffee"
        title="Seven origins,"
        titleItalic="one room."
        lede="A rotating bar of single origins, our house blend, and bags to take home. Roasted up the road on East Wall, cupped before it ever sees the bar."
        tag="Coffee"
      />
      <div className="jv-reveal"><SectionCoffee hideHeader={true} /></div>
      <div className="jv-reveal"><BagCarousel /></div>
      <div className="jv-reveal"><SectionMenu /></div>
      <div className="jv-reveal"><SectionRoastery /></div>
      <Footer />
    </div>
  );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<CoffeePage />);
</script>

</body>
</html>
